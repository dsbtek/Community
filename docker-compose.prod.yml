services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: community_db_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: community_db
      MYSQL_USER: community_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-community_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - community_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: community_backend_prod
    restart: unless-stopped
    environment:
      - DEBUG=0
      - DB_HOST=db
      - DB_NAME=community_db
      - DB_USER=community_user
      - DB_PASSWORD=${DB_PASSWORD:-community_password}
      - DB_PORT=3306
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ALLOWED_HOSTS=localhost,127.0.0.1,frontend
    volumes:
      - backend_static_prod:/app/static
      - backend_media_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - community_network
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn community.wsgi:application --bind 0.0.0.0:8000"

  # React Frontend (Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: community_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - community_network

volumes:
  mysql_data_prod:
  backend_static_prod:
  backend_media_prod:

networks:
  community_network:
    driver: bridge
